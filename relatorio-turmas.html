<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório por Turmas - Morangos Tatuí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f3f4f6; }
        .text-morango { color: #E3244B; }
        .bg-morango { background-color: #E3244B; }
        
        /* Mágica para quebrar a página na hora de imprimir cada turma */
        @media print {
            body { background-color: white; font-size: 14px; }
            .no-print { display: none !important; }
            .turma-section { page-break-after: always; margin-bottom: 0 !important; border: none !important; box-shadow: none !important; }
            .turma-section:last-child { page-break-after: auto; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000 !important; padding: 10px !important; text-align: left; }
            th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="text-gray-800 p-6">

    <!-- TELA DE LOGIN (A mesma segurança do Painel) -->
    <div id="telaLogin" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 no-print">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-black text-gray-800 mb-2">🍓 Separação</h2>
            <p class="text-sm text-gray-500 mb-6">Acesse para ver as listas</p>
            <form id="formLogin" class="space-y-4">
                <input type="email" id="email" required placeholder="E-mail" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-pink-500">
                <input type="password" id="senha" required placeholder="Senha" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-pink-500">
                <p id="erroLogin" class="text-red-500 text-sm font-bold hidden">Login incorreto!</p>
                <button type="submit" class="w-full bg-morango hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">Entrar</button>
            </form>
        </div>
    </div>

    <!-- CONTEÚDO DO RELATÓRIO -->
    <div id="conteudoPainel" class="hidden max-w-5xl mx-auto">
        <header class="no-print flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-extrabold text-gray-800">Listas de Entrega por Turma</h1>
                <p class="text-sm text-gray-500">Pronto para imprimir e entregar para as professoras</p>
            </div>
            <button onclick="window.print()" class="bg-morango hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all flex items-center gap-2">
                🖨️ Imprimir Listas Separadas
            </button>
        </header>

        <div id="containerTurmas" class="space-y-8">
            <p class="text-center text-gray-500 font-bold py-10">Organizando os alunos... 🍓</p>
        </div>
    </div>

<script>
    const SUPABASE_URL = 'https://fepvxdmssoqfktqmbyzn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcHZ4ZG1zc29xZmt0cW1ieXpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDg4NjUsImV4cCI6MjA4OTkyNDg2NX0.Duy840JZEMWxXzguf1JV71xhjdaLmpZiileBdGAJf0I';

    const { createClient } = window.supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- LÓGICA DE LOGIN ---
    async function verificarSessao() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('conteudoPainel').style.display = 'block';
            gerarRelatorio();
        }
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('senha').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('erroLogin').classList.remove('hidden');
        } else {
            document.getElementById('erroLogin').classList.add('hidden');
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('conteudoPainel').style.display = 'block';
            gerarRelatorio();
        }
    });

    // --- LÓGICA DO RELATÓRIO ---
    async function gerarRelatorio() {
        try {
            // Busca apenas os pedidos PAGOS
            const { data, error } = await supabaseClient
                .from('pedidos_escola')
                .select('*')
                .eq('status_pagamento', 'pago');

            if (error) throw error;

            let alunosSeparados = [];

            // Desmembra os irmãos
            data.forEach(pedido => {
                const nomes = pedido.nome_aluno.split(' e ');
                const turmas = pedido.turma.split(' e ');
                
                // Se o número de nomes for igual ao número de turmas, conseguimos separar certinho
                const isMultiplo = nomes.length === turmas.length && nomes.length > 0;

                if (isMultiplo) {
                    for (let i = 0; i < nomes.length; i++) {
                        alunosSeparados.push({
                            aluno: nomes[i].trim(),
                            turma: turmas[i].trim().toUpperCase(),
                            responsavel: pedido.nome_responsavel,
                            qtd_total_pai: pedido.quantidade
                        });
                    }
                } else {
                    // Se o pai preencheu fora do padrão, vai a string inteira mesmo
                    alunosSeparados.push({
                        aluno: pedido.nome_aluno,
                        turma: pedido.turma.toUpperCase(),
                        responsavel: pedido.nome_responsavel,
                        qtd_total_pai: pedido.quantidade
                    });
                }
            });

            // Agrupa por Turma
            const turmasAgrupadas = {};
            alunosSeparados.forEach(item => {
                if (!turmasAgrupadas[item.turma]) turmasAgrupadas[item.turma] = [];
                turmasAgrupadas[item.turma].push(item);
            });

            // Ordena as turmas em ordem alfabética (1º Ano A, 1º Ano B, etc)
            const turmasOrdenadas = Object.keys(turmasAgrupadas).sort();

            let htmlFinal = '';

            if (turmasOrdenadas.length === 0) {
                htmlFinal = '<p class="text-center text-gray-500 font-bold py-10">Nenhum pedido pago encontrado.</p>';
            }

            turmasOrdenadas.forEach(nomeTurma => {
                const alunosDaTurma = turmasAgrupadas[nomeTurma];
                
                // Ordena os alunos em ordem alfabética dentro da turma
                alunosDaTurma.sort((a, b) => a.aluno.localeCompare(b.aluno));

                let linhasTabela = '';
                alunosDaTurma.forEach((item, index) => {
                    linhasTabela += `
                        <tr class="border-b border-gray-100 hover:bg-gray-50">
                            <td class="p-3 text-center text-gray-400 font-bold w-10">${index + 1}</td>
                            <td class="p-3 font-bold text-gray-800 text-lg uppercase">${item.aluno}</td>
                            <td class="p-3 text-gray-600">${item.responsavel}</td>
                            <td class="p-3 text-center print-only w-24">
                                <div style="width: 24px; height: 24px; border: 2px solid #666; margin: 0 auto; border-radius: 4px;"></div>
                            </td>
                        </tr>
                    `;
                });

                htmlFinal += `
                    <div class="turma-section bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                        <div class="flex justify-between items-end border-b-2 border-morango pb-4 mb-4">
                            <div>
                                <h2 class="text-2xl font-black text-morango uppercase">TURMA: ${nomeTurma}</h2>
                                <p class="text-gray-500 mt-1 font-semibold">Total de alunos nesta lista: ${alunosDaTurma.length}</p>
                            </div>
                            <div class="print-only text-right">
                                <p class="text-xs text-gray-400">Morangos Tatuí</p>
                                <p class="font-bold">Professora(o): _______________________</p>
                            </div>
                        </div>
                        
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-sm uppercase">
                                    <th class="p-3 text-center w-10">Nº</th>
                                    <th class="p-3">Nome do Aluno</th>
                                    <th class="p-3">Responsável (Pagante)</th>
                                    <th class="p-3 text-center print-only w-24">Entregue</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${linhasTabela}
                            </tbody>
                        </table>
                    </div>
                `;
            });

            document.getElementById('containerTurmas').innerHTML = htmlFinal;

        } catch (error) {
            console.error(error);
            document.getElementById('containerTurmas').innerHTML = '<p class="text-center text-red-500 font-bold py-10">Erro ao carregar as turmas.</p>';
        }
    }

    verificarSessao();
</script>
</body>
</html>
